apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: metabolic-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: metabolic-ai/backend-api:latest
          ports:
            - containerPort: 8080
