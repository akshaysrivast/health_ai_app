version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: metabolic-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: metabolic-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-net

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: metabolic-kafka-topic-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "/topics/create-topics.sh"]
    volumes:
      - ./create-topics.sh:/topics/create-topics.sh:ro
      - ./topics.txt:/topics/topics.txt:ro
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
